<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Docente - Campus360</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">G1</div>
            <span class="navbar-title">Campus<span>360</span></span>
        </div>
        <div class="navbar-user">
            <div class="navbar-user-info">
                <div class="navbar-user-name" id="user-name">Docente</div>
                <div class="navbar-user-role" id="user-email"></div>
            </div>
            <div class="navbar-avatar" id="user-avatar">D</div>
            <button onclick="handleLogout()" class="btn btn-secondary btn-sm">Cerrar Sesión</button>
        </div>
    </nav>
    <div class="container">

        <!-- Bienvenida -->
        <div class="card">
            <div class="card-header">
                <h2>👋 Bienvenido</h2>
            </div>
            <div id="bienvenida" class="info-card">
                <p class="loading">Cargando...</p>
            </div>
        </div>

        <!-- Mi Cuenta -->
        <div class="card">
            <div class="card-header">
                <h2>👤 Mi Cuenta</h2>
            </div>
            <div id="info-cuenta" class="info-card"></div>
        </div>

        <!-- Cambiar Contraseña (CU-04) -->
        <div class="card">
            <div class="card-header">
                <h2>🔑 Cambiar Contraseña</h2>
            </div>
            <div class="info-card">
                <p style="margin-bottom: 16px; color: #6b7280; font-size: 14px;">
                    Por seguridad, tu contraseña debe tener al menos 8 caracteres, una mayúscula, un número y un símbolo.
                </p>
                <div style="display: flex; flex-direction: column; gap: 12px; max-width: 400px;">
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151;">Contraseña actual</label>
                        <input type="password" id="passwordActual" placeholder="Tu contraseña actual"
                            style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151;">Nueva contraseña</label>
                        <input type="password" id="passwordNueva" placeholder="Nueva contraseña"
                            style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151;">Confirmar nueva contraseña</label>
                        <input type="password" id="passwordConfirm" placeholder="Repite la nueva contraseña"
                            style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                    </div>
                    <button id="btn-cambiar-password" onclick="cambiarPassword(event)" class="btn btn-primary"
                        style="margin-top: 4px; align-self: flex-start;">
                        Cambiar Contraseña
                    </button>
                    <div id="cambiar-password-msg" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- Mis Sesiones Activas -->
        <div class="card">
            <div class="card-header">
                <h2>🖥️ Mis Sesiones Activas</h2>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Dispositivo</th>
                            <th>IP</th>
                            <th>Inicio</th>
                            <th>Expira</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="mis-sesiones-tbody">
                        <tr><td colspan="6" class="loading">Cargando sesiones...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
    <script src="/js/app.js"></script>
</body>
</html>
